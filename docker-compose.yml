services:
  api:
    build: .
    container_name: moviecatalog-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - mongo
    command: npm run dev

  mongo:
    image: mongo:7
    container_name: moviecatalog_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: